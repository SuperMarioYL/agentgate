# AgentGate default policy — ordered, first-match-wins.
# Generated by `agentgate init`. Edit freely; see the README for the full DSL.

default: ask

rules:
  # Ask before every dependency install so you see exactly what gets pulled.
  - match:
      action: exec
      target_glob: "*install*"
    decision: ask

  # Confine filesystem writes to the project directory; deny the rest.
  - match:
      action: fs_write
      target_glob: "$PWD/**"
    decision: allow
    scope: "$PWD"
  - match:
      action: fs_write
    decision: deny

  # Allow the common public registries; gate every other host.
  - match:
      action: net_egress
      target_glob: "registry.npmjs.org"
    decision: allow
  - match:
      action: net_egress
      target_glob: "pypi.org"
    decision: allow
  - match:
      action: net_egress
      target_glob: "files.pythonhosted.org"
    decision: allow
  - match:
      action: net_egress
      target_glob: "github.com"
    decision: allow
  - match:
      action: net_egress
      target_glob: "proxy.golang.org"
    decision: allow
  - match:
      action: net_egress
    decision: deny
